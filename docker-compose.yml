version: '3.8'

services:
  gpxtooth:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpxtooth-web

    ports:
      - "127.0.0.1:8081:80"

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
      
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s